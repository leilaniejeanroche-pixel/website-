<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Forms | Saint Patrick's Academy, Inc.</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="portal-page">
  <header class="site-header">
    <a class="brand" href="index.html" aria-label="Saint Patrick's Academy, Inc.">
      <img src="assets/logo.jpg" alt="Saint Patrick's Academy logo">
      <span>Saint Patrick's Academy, Inc.</span>
    </a>
    <nav aria-label="Forms navigation">
      <a href="index.html">Home</a>
      <a href="portal.html">Student Portal</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <main class="portal-main">
    <section class="portal-hero">
      <div>
        <p class="eyebrow">Paperless Requests</p>
        <h1>Digital Forms</h1>
        <p>Use these sample forms for inquiries, enrollment requests, leave requests, and feedback.</p>
      </div>
      <img src="assets/logo.jpg" alt="Saint Patrick's Academy logo">
    </section>

    <section class="form-grid">
      <form class="info-form">
        <h2>Inquiry Form</h2>
        <label>Full name<input type="text" placeholder="Your name"></label>
        <label>Email or phone<input type="text" placeholder="Contact details"></label>
        <label>Message<textarea placeholder="Write your inquiry"></textarea></label>
        <button class="contact-button" type="button">Submit Inquiry</button>
      </form>
      <form class="info-form">
        <h2>Enrollment Request</h2>
        <label>Student name<input type="text" placeholder="Student name"></label>
        <label>Grade level<input type="text" placeholder="Incoming grade"></label>
        <label>Guardian contact<input type="text" placeholder="Phone or email"></label>
        <button class="contact-button" type="button">Send Request</button>
      </form>
      <form class="info-form">
        <h2>Leave Request</h2>
        <label>Student name<input type="text" placeholder="Student name"></label>
        <label>Date<input type="date"></label>
        <label>Reason<textarea placeholder="Reason for leave"></textarea></label>
        <button class="contact-button" type="button">Submit Leave</button>
      </form>
      <form class="info-form">
        <h2>Feedback Form</h2>
        <label>Name<input type="text" placeholder="Optional"></label>
        <label>Feedback<textarea placeholder="Share your feedback"></textarea></label>
        <button class="contact-button" type="button">Send Feedback</button>
      </form>
    </section>
  </main>
</body>
</html>
