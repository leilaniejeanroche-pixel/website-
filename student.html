<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Dashboard | Saint Patrick's Academy, Inc.</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="portal-page">
  <header class="site-header">
    <a class="brand" href="index.html" aria-label="Saint Patrick's Academy, Inc.">
      <img src="assets/logo.jpg" alt="Saint Patrick's Academy logo">
      <span>Saint Patrick's Academy, Inc.</span>
    </a>

    <nav aria-label="Student dashboard navigation">
      <a href="index.html">Home</a>
      <a href="events.html">Events</a>
      <a href="announcements.html">Announcements</a>
      <a href="portal.html">Create Account</a>
      <a href="login.html">Student Login</a>
    </nav>
  </header>

  <main class="portal-main">
    <section class="student-profile" id="studentProfile"></section>

    <section class="student-dashboard" id="studentDashboard">
      <article class="subject-panel">
        <div>
          <p class="eyebrow">Class List</p>
          <h2>Subjects</h2>
        </div>
        <div class="subject-list" id="subjectList"></div>
      </article>

      <article class="bill-panel" id="billing">
        <div>
          <p class="eyebrow">Statement</p>
          <h2>Billing in Pesos</h2>
        </div>
        <div class="bill-list" id="billList"></div>
        <div class="bill-total">
          <span>Total Balance</span>
          <strong id="billTotal">PHP 0</strong>
        </div>
      </article>
    </section>
  </main>

  <script src="student.js"></script>
</body>
</html>
