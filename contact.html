<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Saint Patrick's Academy, Inc.</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="portal-page">
  <header class="site-header">
    <a class="brand" href="index.html" aria-label="Saint Patrick's Academy, Inc.">
      <img src="assets/logo.jpg" alt="Saint Patrick's Academy logo">
      <span>Saint Patrick's Academy, Inc.</span>
    </a>
    <nav aria-label="Contact navigation">
      <a href="index.html">Home</a>
      <a href="forms.html">Forms</a>
      <a href="faq.html">FAQ</a>
    </nav>
  </header>

  <main class="portal-main">
    <section class="portal-hero">
      <div>
        <p class="eyebrow">Contact</p>
        <h1>Saint Patrick's Academy, Inc.</h1>
        <p>Dingalan, Aurora</p>
      </div>
      <img src="assets/logo.jpg" alt="Saint Patrick's Academy logo">
    </section>

    <section class="contact-page-grid">
      <article class="contact-detail"><strong>School Office</strong><span>Monday to Friday, 8:00 AM to 4:00 PM</span></article>
      <article class="contact-detail"><strong>Email</strong><span>office@spai.edu.ph</span></article>
      <article class="contact-detail"><strong>Location</strong><span>Dingalan, Aurora</span></article>
      <form class="info-form">
        <h2>Contact Form</h2>
        <label>Name<input type="text" placeholder="Your name"></label>
        <label>Email or phone<input type="text" placeholder="Contact details"></label>
        <label>Message<textarea placeholder="Write your message"></textarea></label>
        <button class="contact-button" type="button">Send Message</button>
      </form>
    </section>
  </main>
</body>
</html>
